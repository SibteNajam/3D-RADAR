<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Gamified Cards - VaultBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070810; font-family: 'Montserrat', sans-serif; padding: 40px 20px; }

    /* ═══ SPREAD SECTION ═══ */
    #spread-sec {
      border-bottom: .5px solid #111828;
      min-height: 460px;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
    }

    .sec-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: .5px solid #0D1018;
      position: relative;
      z-index: 10;
    }

    .sec-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #7A8AA0;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .sec-title-accent {
      color: #4DB86A;
      margin-right: 4px;
    }

    .sec-btn {
      font-size: 10px;
      color: #3A4060;
      background: rgba(13, 16, 24, 0.4);
      border: .5px solid #1A1F30;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      transition: all .18s;
    }

    .sec-btn:hover {
      color: #4DB86A;
      border-color: #4DB86A44;
      background: rgba(77, 184, 106, 0.05);
    }

    #sp-track-wrap {
      overflow-x: auto;
      overflow-y: visible;
      padding: 60px 20px 40px;
      scrollbar-width: none;
      position: relative;
      z-index: 5;
    }

    #sp-track-wrap::-webkit-scrollbar {
      display: none;
    }

    #sp-track {
      display: flex;
      width: max-content;
      gap: 20px;
      padding: 40px 24px 24px;
      align-items: flex-end;
    }

    /* ═══ CARD COMMON ═══ */
    .card {
      position: relative;
      height: 250px;
      width: 190px;
      flex-shrink: 0;
      transform: scale(0.92);
      opacity: 0.9;
      filter: brightness(0.92);
      transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86);
    }

    .card:hover {
      transform: scale(0.96);
      opacity: 1;
      filter: brightness(1);
    }

    /* ═══ VERSION 1: GEOMETRIC OPENING BOX ═══ */
    /* UI from vaultbot_full_dashboard.html — glow kept from vaultfullv1 original */
    .card.v1 .boxshadow {
      position: absolute;
      height: 100%;
      width: 100%;
      border: 1px solid var(--hex-color);
      transform: scale(0.8);
      box-shadow: rgb(var(--neon-rgb)) 0px 30px 70px 0px;
      transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86);
    }

    .card.v1 .main {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      position: relative;
      -webkit-clip-path: polygon(0 33px, 33px 0, calc(100% - 33px) 0, 100% 33px, 100% calc(100% - 33px), calc(100% - 33px) 100%, 33px 100%, 0 calc(100% - 33px));
      clip-path: polygon(0 33px, 33px 0, calc(100% - 33px) 0, 100% 33px, 100% calc(100% - 33px), calc(100% - 33px) 100%, 33px 100%, 0 calc(100% - 33px));
      filter: 
        drop-shadow(0 0 2px rgba(var(--neon-rgb), 0.6))
        drop-shadow(0 0 4px rgba(var(--neon-rgb), 0.4))
        drop-shadow(0 0 8px rgba(var(--neon-rgb), 0.2));
      transition: all 0.3s cubic-bezier(0.785, 0.135, 0.15, 0.86);
    }

    /* Neon border outline via pseudo-element */
    .card.v1 .main::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 1.5px solid rgba(var(--neon-rgb), 0.5);
      -webkit-clip-path: polygon(0 33px, 33px 0, calc(100% - 33px) 0, 100% 33px, 100% calc(100% - 33px), calc(100% - 33px) 100%, 33px 100%, 0 calc(100% - 33px));
      clip-path: polygon(0 33px, 33px 0, calc(100% - 33px) 0, 100% 33px, 100% calc(100% - 33px), calc(100% - 33px) 100%, 33px 100%, 0 calc(100% - 33px));
      box-shadow: 
        inset 0 0 3px rgba(var(--neon-rgb), 0.5),
        0 0 2px rgba(var(--neon-rgb), 0.5);
      pointer-events: none;
      z-index: 100;
    }

    /* Subtle gradient overlay */
    .card.v1 .main::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(0deg, rgb(var(--dark-rgb)) 0%, rgb(var(--neon-rgb)) 60%, rgb(var(--dark-rgb)) 100%);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }

    .card.v1 .main .top {
      position: absolute;
      top: 0px;
      left: 0;
      width: 0px;
      height: 0px;
      z-index: 10;
      border-top: 95px solid rgba(7, 8, 16, 0.85);
      border-left: 95px solid transparent;
      border-right: 95px solid transparent;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.1), 0 4px 12px rgba(0, 0, 0, 0.4);
      transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86);
    }

    .card.v1 .main .side {
      position: absolute;
      width: 100%;
      top: 0;
      transform: translateX(-50%);
      height: 101%;
      background: rgba(7, 8, 16, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.12), 0 8px 24px rgba(0, 0, 0, 0.5);
      -webkit-clip-path: polygon(0% 0%, 50% 0, 95% 45%, 100% 100%, 0% 100%);
      clip-path: polygon(0% 0%, 50% 0, 95% 45%, 100% 100%, 0% 100%);
      transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86) 1s;
      z-index: 10;
    }

    .card.v1 .main .left { left: 0; }

    .card.v1 .main .right {
      right: 0;
      transform: translateX(50%) scale(-1, 1);
    }

    .card.v1 .main .title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 75px;
      font-weight: bold;
      font-family: 'Montserrat', sans-serif;
      font-size: 21px;
      color: #fff;
      opacity: 0;
      z-index: 11;
      transition: all 0.2s ease-out 0s;
    }

    .card.v1 .main .subtitle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 108px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: #fff;
      text-shadow: 0 0 10px var(--hex-color), 0 2px 4px rgba(0,0,0,0.5);
      opacity: 0;
      z-index: 11;
      transition: all 0.2s ease-out 0s;
    }

    .card.v1 .main .button-container {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
    }

    .card.v1 .main .button-container .button {
      position: absolute;
      transform: translateX(-50%);
      padding: 0;
      width: 83px;
      height: 27px;
      -webkit-clip-path: polygon(0 0, 100% 0, 81% 100%, 21% 100%);
      clip-path: polygon(0 0, 100% 0, 81% 100%, 21% 100%);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px) saturate(120%);
      -webkit-backdrop-filter: blur(10px) saturate(120%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.15), 0 4px 12px rgba(0, 0, 0, 0.3);
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 11px;
      transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86);
    }

    .card.v1 .main .button-container .button .svg {
      width: 12px;
      transition: all 0.2s cubic-bezier(0.785, 0.135, 0.15, 0.86);
    }

    .card.v1 .main .button-container .button:nth-child(1) { bottom: 250px; transition-delay: 0.4s; }
    .card.v1 .main .button-container .button:nth-child(2) { bottom: 250px; transition-delay: 0.6s; }
    .card.v1 .main .button-container .button:nth-child(3) { bottom: 250px; transition-delay: 0.8s; }

    .card.v1:hover .main { transform: scale(1.1); }
    .card.v1:hover .main .top { top: -42px; }
    .card.v1:hover .main .left { left: -42px; transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86) 0.1s; }
    .card.v1:hover .main .right { right: -42px; transition: all 0.5s cubic-bezier(0.785, 0.135, 0.15, 0.86) 0.1s; }
    .card.v1:hover .main .title,
    .card.v1:hover .main .subtitle { opacity: 1; transition: all 0.2s ease-out 1.3s; }
    .card.v1:hover .main .button-container .button:nth-child(1) { bottom: 85px; transition-delay: 0.8s; }
    .card.v1:hover .main .button-container .button:nth-child(2) { bottom: 55px; transition-delay: 0.6s; }
    .card.v1:hover .main .button-container .button:nth-child(3) { bottom: 27px; transition-delay: 0.4s; }

    .card.v1.force-open .main { transform: scale(1.1); transition: none !important; }
    .card.v1.force-open .main .top { top: -42px; transition: none !important; }
    .card.v1.force-open .main .left { left: -42px; transition: none !important; }
    .card.v1.force-open .main .right { right: -42px; transition: none !important; }
    .card.v1.force-open .main .title,
    .card.v1.force-open .main .subtitle { opacity: 1; transition: none !important; }
    .card.v1.force-open .main .button-container .button { transition: none !important; }
    .card.v1.force-open .main .button-container .button:nth-child(1) { bottom: 78px; transition-delay: 0s !important; }
    .card.v1.force-open .main .button-container .button:nth-child(2) { bottom: 48px; transition-delay: 0s !important; }
    .card.v1.force-open .main .button-container .button:nth-child(3) { bottom: 18px; transition-delay: 0s !important; }

    /* ═══ TOAST ═══ */
    #toast {
      position: absolute;
      top: 60px;
      right: 14px;
      z-index: 950;
      background: #0B0E1C;
      border: .5px solid #4DB86A33;
      border-radius: 7px;
      padding: 7px 12px;
      font-size: 10px;
      color: #4DB86A;
      opacity: 0;
      transform: translateX(10px);
      transition: opacity .28s, transform .28s;
      pointer-events: none;
    }

    #toast.on {
      opacity: 1;
      transform: translateX(0);
    }
  </style>
</head>

<body>
  <div id="spread-sec" style="position:relative;">
    <div class="sec-hd">
      <span class="sec-title">Position spread</span>
      <button class="sec-btn" onclick="dealNew()">+ Deal card</button>
    </div>
    <div id="sp-track-wrap">
      <div id="sp-track"></div>
    </div>
    <div id="toast"></div>
  </div>

  <script>
    const POOL = [
      { sym: 'BTC', pair: 'BTC/USDT', price: 64820, change: 3.42, vol: '$42.1B', high: 65400, low: 62100, dir: 'LONG', lev: '10x', pnl: 420.30 },
      { sym: 'ETH', pair: 'ETH/USDT', price: 3191, change: -1.18, vol: '$18.4B', high: 3310, low: 3140, dir: 'SHORT', lev: '5x', pnl: -88.50 },
      { sym: 'SOL', pair: 'SOL/USDT', price: 161, change: 5.67, vol: '$4.2B', high: 168, low: 148, dir: 'LONG', lev: '3x', pnl: 310.80 },
      { sym: 'BNB', pair: 'BNB/USDT', price: 594, change: 1.23, vol: '$1.8B', high: 601, low: 579, dir: 'LONG', lev: '7x', pnl: 199.70 },
      { sym: 'AVAX', pair: 'AVAX/USDT', price: 38.4, change: -2.11, vol: '$620M', high: 40.2, low: 37.1, dir: 'SHORT', lev: '4x', pnl: -44.20 },
      { sym: 'ARB', pair: 'ARB/USDT', price: 1.12, change: 7.34, vol: '$310M', high: 1.18, low: 1.02, dir: 'LONG', lev: '5x', pnl: 88.60 },
      { sym: 'LINK', pair: 'LINK/USDT', price: 14.82, change: 0.88, vol: '$540M', high: 15.4, low: 14.2, dir: 'LONG', lev: '3x', pnl: 22.10 },
      { sym: 'INJ', pair: 'INJ/USDT', price: 28.6, change: -3.44, vol: '$290M', high: 30.8, low: 27.9, dir: 'SHORT', lev: '6x', pnl: -61.40 },
      { sym: 'TIA', pair: 'TIA/USDT', price: 9.14, change: 4.12, vol: '$180M', high: 9.6, low: 8.8, dir: 'LONG', lev: '4x', pnl: 55.20 },
      { sym: 'WIF', pair: 'WIF/USDT', price: 2.87, change: -1.76, vol: '$220M', high: 3.1, low: 2.72, dir: 'SHORT', lev: '3x', pnl: -28.40 },
      { sym: 'JUP', pair: 'JUP/USDT', price: 0.94, change: 6.21, vol: '$140M', high: 1.02, low: 0.88, dir: 'LONG', lev: '5x', pnl: 44.10 },
      { sym: 'SEI', pair: 'SEI/USDT', price: 0.61, change: -1.90, vol: '$88M', high: 0.66, low: 0.58, dir: 'SHORT', lev: '4x', pnl: -18.30 },
    ];

    /* Coin color mapping for cyberpunk neon aesthetic */
    function getCoinColors(symbol) {
      const colorMap = {
        'BTC': { neon: '255,170,0', dark: '40,30,0', hex: '#ffaa00' },
        'ETH': { neon: '98,126,234', dark: '20,15,50', hex: '#627eea' },
        'SOL': { neon: '0,255,136', dark: '8,20,25', hex: '#00ff88' },
        'BNB': { neon: '240,165,23', dark: '40,30,0', hex: '#f0a517' },
        'AVAX': { neon: '232,65,66', dark: '40,15,15', hex: '#e84142' },
        'ARB': { neon: '40,185,239', dark: '15,25,50', hex: '#28b9ef' },
        'LINK': { neon: '84,71,255', dark: '15,12,50', hex: '#5447ff' },
        'INJ': { neon: '244,208,63', dark: '40,35,0', hex: '#f4d03f' },
        'TIA': { neon: '98,71,234', dark: '20,15,50', hex: '#6247ea' },
        'WIF': { neon: '139,95,191', dark: '30,20,45', hex: '#8b5fbf' },
        'JUP': { neon: '255,215,0', dark: '40,35,0', hex: '#ffd700' },
        'SEI': { neon: '32,185,163', dark: '10,30,25', hex: '#20b9a3' }
      };
      return colorMap[symbol] || { neon: '0,255,136', dark: '8,20,25', hex: '#00ff88' };
    }

    let cardGlobalIndex = 0;
    let dealIdx = 7;

    function makeSpCard(data, forcedIdx = null, isPopup = false) {
      const idx = forcedIdx !== null ? forcedIdx : cardGlobalIndex++;
      const el = document.createElement('div');
      const ip = data.change >= 0;

      /* ═════════ SMALL CARD - NORMAL VIEW ═════════ */
      el.className = 'card v1';
      el.dataset.v = '0';
      const pnlStr = (data.pnl >= 0 ? '+$' : '\u2212$') + Math.abs(data.pnl).toFixed(2);

      const colors = getCoinColors(data.sym);
      el.style.setProperty('--neon-rgb', colors.neon);
      el.style.setProperty('--dark-rgb', colors.dark);
      el.style.setProperty('--hex-color', colors.hex);

      el.innerHTML = `
        <div class="boxshadow"></div>
        <div class="main">
          <div class="top"></div>
          <div class="left side"></div>
          <div class="right side"></div>
          <div class="title">${data.sym}</div>
          <div class="subtitle">${pnlStr}</div>
          <div class="button-container">
            <button class="button">
              <svg class="svg" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--hex-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>
              </svg>
              <span>${data.dir === 'LONG' ? '68.4' : '54.2'}%</span>
            </button>
            <button class="button">
              <svg class="svg" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--hex-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
              </svg>
              <span>${data.lev}</span>
            </button>
            <button class="button">
              <svg class="svg" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--hex-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
              </svg>
              <span>${ip ? (42 + Math.random() * 52).toFixed(0) : (12 + Math.random() * 36).toFixed(0)}%</span>
            </button>
          </div>
        </div>
      `;

      return el;
    }

    function initSpread() {
      const track = document.getElementById('sp-track');
      track.innerHTML = '';
      POOL.slice(0, 7).forEach((d, i) => {
        const el = makeSpCard(d);
        el.style.transform = `translateY(40px)`;
        el.style.opacity = '0';
        el.style.cursor = 'pointer';
        track.appendChild(el);
        setTimeout(() => {
          el.style.transition = 'transform .58s cubic-bezier(.22,1,.36,1), opacity .58s, background-color .3s';
          el.style.transform = `translateY(0)`;
          el.style.opacity = '1';
          el.addEventListener('mouseenter', () => {
            el.style.transform = 'translateY(-8px) scale(1.02)';
          });
          el.addEventListener('mouseleave', () => {
            el.style.transform = 'translateY(0) scale(1)';
          });
        }, i * 85);
      });
    }

    function dealNew() {
      const data = POOL[dealIdx % POOL.length];
      dealIdx++;
      const track = document.getElementById('sp-track');
      const el = makeSpCard(data);
      el.style.transform = `translateY(-60px) scale(.95)`;
      el.style.opacity = '0';
      track.appendChild(el);
      requestAnimationFrame(() => {
        el.style.transition = 'transform .6s cubic-bezier(.34,1.4,.64,1),opacity .38s';
        el.style.transform = `translateY(0) scale(1)`;
        el.style.opacity = '1';
      });
      const toast = document.getElementById('toast');
      toast.textContent = `\u2726 ${data.sym} dealt into position`;
      toast.classList.add('on');
      setTimeout(() => toast.classList.remove('on'), 2200);
    }

    /* ═══ BOOT ═══ */
    initSpread();
    setInterval(() => { dealNew(); }, 12000);
  </script>
</body>
</html>
