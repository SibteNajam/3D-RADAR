<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultBot | 3D Globe Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020c18;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    /* ── RADAR CONTAINER ── */
    #globe-radar-sec {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #020c18;
      overflow: hidden;
    }
    
    #radarCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    
    #radarUI {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── HOLOGRAPHIC POPUPS ── */
    .popup {
      position: absolute;
      pointer-events: none;
      background: rgba(2, 10, 24, 0.92);
      border: 1px solid;
      border-radius: 4px;
      padding: 6px 10px;
      opacity: 0;
      transform: scale(0.75);
      transition: opacity 0.3s ease, transform 0.35s cubic-bezier(.2, 1.3, .35, 1);
      white-space: nowrap;
      z-index: 20;
      font-family: 'Space Mono', monospace;
    }

    .popup.show { opacity: 1; transform: scale(1); }
    .popup.hide { opacity: 0; transform: scale(0.7); transition: opacity 0.35s, transform 0.25s; }

    .p-sym { font-size: 11px; font-weight: 700; letter-spacing: .08em; display: block; margin-bottom: 2px; }
    .p-row { display: flex; gap: 6px; align-items: center; }
    .p-conf { font-size: 9px; font-weight: 700; letter-spacing: .06em; }
    .p-type { font-size: 9px; font-weight: 700; letter-spacing: .1em; }
    .p-line { height: 1px; margin-top: 4px; opacity: 0.5; border-radius: 1px; transition: width 0.8s ease; }
    
    /* Decoration */
    .ui-layer {
      position: absolute;
      top: 20px; left: 20px;
      z-index: 10;
      font-family: 'Space Mono', monospace;
      color: #00ff9d;
      font-size: 12px;
      letter-spacing: 0.1em;
      opacity: 0.8;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="globe-radar-sec">
    <canvas id="radarCanvas"></canvas>
    <div id="radarUI"></div>
    <div class="ui-layer">VAULTBOT // 3D ORBITAL SCANNER ACTIVE</div>
  </div>

  <script>
    const POOL = [
      { pair: 'BTC/USDT', change: 3.42, dir: 'LONG' },
      { pair: 'ETH/USDT', change: -1.18, dir: 'SHORT' },
      { pair: 'SOL/USDT', change: 5.67, dir: 'LONG' },
      { pair: 'BNB/USDT', change: 1.23, dir: 'LONG' },
      { pair: 'AVAX/USDT', change: -2.11, dir: 'SHORT' },
      { pair: 'ARB/USDT', change: 7.34, dir: 'LONG' },
      { pair: 'LINK/USDT', change: 0.88, dir: 'LONG' },
      { pair: 'INJ/USDT', change: -3.44, dir: 'SHORT' },
      { pair: 'TIA/USDT', change: 4.12, dir: 'LONG' },
      { pair: 'WIF/USDT', change: -1.76, dir: 'SHORT' },
      { pair: 'JUP/USDT', change: 6.21, dir: 'LONG' },
      { pair: 'SEI/USDT', change: -1.90, dir: 'SHORT' },
    ];

    /* 🌐 3D GLOBE RADAR ENGINE */
    const rcv2 = document.getElementById('radarCanvas');
    const rctx2 = rcv2.getContext('2d');
    const rUI = document.getElementById('radarUI');

    let globeAngleY = 0;
    let fov = 500;
    let globeRadius = 240;

    // Spherical Distribution mapped from POOL
    const RADAR_SIGS = POOL.map((p, i) => {
      const phi = Math.acos(1 - 2 * (i + 0.5) / POOL.length); 
      const theta = Math.PI * (1 + Math.sqrt(5)) * (i + 0.5);
      return {
        sym: p.pair, conf: 70 + Math.floor(Math.random() * 28),
        color: p.change >= 0 ? '#00ff9d' : '#ff6b6b',
        type: p.dir, phi: phi, theta: theta % (Math.PI * 2), isPopped: false
      };
    });

    function resizeRadar() {
      rcv2.width = window.innerWidth;
      rcv2.height = window.innerHeight;
      // Adjust scale for smaller screens
      globeRadius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
      fov = globeRadius * 2;
    }
    window.addEventListener('resize', resizeRadar);
    resizeRadar();

    // 3D Projection Math
    function project3D(x, y, z) {
      const cy = rcv2.height * 0.5;
      const cx = rcv2.width * 0.5;
      const scale = fov / (fov + z + globeRadius * 1.2);
      return { px: cx + x * scale, py: cy + y * scale, s: scale };
    }

    function rotateY(x, z, angle) { return { x: x * Math.cos(angle) - z * Math.sin(angle), z: x * Math.sin(angle) + z * Math.cos(angle) }; }
    function rotateX(y, z, angle) { return { y: y * Math.cos(angle) - z * Math.sin(angle), z: y * Math.sin(angle) + z * Math.cos(angle) }; }

    // Precompute Globe Wireframe
    const globeGrid = [];
    for(let lat = -Math.PI/2 + 0.2; lat < Math.PI/2; lat += 0.2) {
      const ring = []; 
      const y = Math.sin(lat);
      const r = Math.cos(lat);
      for(let lon = 0; lon <= Math.PI*2.01; lon += 0.15) ring.push({x: Math.cos(lon)*r, y: y, z: Math.sin(lon)*r});
      globeGrid.push(ring);
    }
    for(let lon = 0; lon < Math.PI*2; lon += 0.3) {
      const ring = [];
      for(let lat = -Math.PI/2; lat <= Math.PI/2; lat += 0.08) ring.push({ x: Math.cos(lon)*Math.cos(lat), y: Math.sin(lat), z: Math.sin(lon)*Math.cos(lat) });
      globeGrid.push(ring);
    }

    function drawWireframeRing(ring, tiltX, rotY) {
      rctx2.beginPath(); let first = true;
      for(let pt of ring) {
        let x0 = pt.x * globeRadius, y0 = pt.y * globeRadius, z0 = pt.z * globeRadius;
        let {x, z} = rotateY(x0, z0, rotY);
        let rx = rotateX(y0, z, tiltX);
        let p = project3D(x, rx.y, rx.z);
        if (first) { rctx2.moveTo(p.px, p.py); first = false; } else { rctx2.lineTo(p.px, p.py); }
      }
      rctx2.stroke();
    }

    function drawGlobeEngine() {
      const tiltX = 0.28; 

      rctx2.strokeStyle = 'rgba(0, 195, 255, 0.1)';
      rctx2.lineWidth = 1.2;
      globeGrid.forEach(ring => drawWireframeRing(ring, tiltX, globeAngleY));

      RADAR_SIGS.forEach(sig => {
        const sx = Math.sin(sig.phi) * Math.cos(sig.theta) * globeRadius;
        const sz = Math.sin(sig.phi) * Math.sin(sig.theta) * globeRadius;
        const sy = Math.cos(sig.phi) * globeRadius;
        
        let {x, z} = rotateY(sx, sz, globeAngleY);
        let rx = rotateX(sy, z, tiltX);
        let p = project3D(x, rx.y, rx.z);

        const isFront = rx.z < 0;
        const alpha = isFront ? 0.95 : 0.15;
        const szRad = isFront ? 4.5 * p.s : 2 * p.s;

        rctx2.beginPath();
        rctx2.arc(p.px, p.py, szRad, 0, Math.PI*2);
        rctx2.fillStyle = isFront ? sig.color : 'rgba(255,255,255,0.4)';
        rctx2.globalAlpha = alpha;
        rctx2.fill();

        if (isFront && p.s > 0.8) {
          rctx2.font = "800 13px 'Space Mono'";
          rctx2.fillText(sig.sym.split('/')[0], p.px + 10, p.py + 4);
        }
        rctx2.globalAlpha = 1;

        // Front-Center Scanner Trigger
        if (isFront && x > -5 && x < 5 && rx.z < -globeRadius * 0.5 && !sig.isPopped) {
          sig.isPopped = true;
          spawnGlobePopup(sig, p.px, p.py);
        } else if (x > 25 || rx.z > 0) {
          sig.isPopped = false; 
        }
      });
      
      const cx = rcv2.width * 0.5, cy = rcv2.height * 0.5, h = globeRadius * 2 * 1.25;
      const grad = rctx2.createLinearGradient(cx - 30, 0, cx, 0);
      grad.addColorStop(0, "rgba(0,255,157,0)"); grad.addColorStop(1, "rgba(0,255,157,0.25)");
      rctx2.fillStyle = grad; rctx2.fillRect(cx - 30, cy - h/2, 30, h);
      rctx2.fillStyle = "#00ff9d"; rctx2.fillRect(cx, cy - h/2, 2, h);
    }

    function spawnGlobePopup(sig, px, py) {
      if(rUI.children.length > 8) rUI.firstElementChild.remove();
      const el = document.createElement('div');
      el.className = 'popup';
      el.style.borderColor = sig.color + '55';
      el.style.left = (px + 24) + 'px'; 
      el.style.top = (py - 24) + 'px';
      const tc = sig.type === 'LONG' ? '#00ff9d' : '#ff6b6b';
      const cc = sig.conf >= 85 ? '#00e5ff' : sig.conf >= 75 ? '#ffd60a' : '#ff6b6b';
      el.innerHTML = `<span class="p-sym" style="color:${sig.color}">${sig.sym}</span><div class="p-row"><span class="p-conf" style="color:${cc}">${sig.conf}%</span><span class="p-type" style="color:${tc}">${sig.type}</span></div><div class="p-line" style="background:${sig.color};width:0%" data-w="${sig.conf}%"></div>`;
      rUI.appendChild(el);
      setTimeout(() => el.classList.add('show'), 30);
      setTimeout(() => { const b = el.querySelector('.p-line'); if (b) b.style.width = b.dataset.w; }, 100);
      setTimeout(() => { el.classList.remove('show'); el.classList.add('hide'); setTimeout(() => el.remove(), 400); }, 3800);
    }

    function radarFrame() {
      rctx2.clearRect(0, 0, rcv2.width, rcv2.height);
      globeAngleY -= 0.008; 
      drawGlobeEngine();
      requestAnimationFrame(radarFrame);
    }

    radarFrame();
  </script>
</body>
</html>
